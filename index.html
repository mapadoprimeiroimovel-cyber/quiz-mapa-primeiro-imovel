<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mapa do Primeiro Imóvel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAF6EC;
    --card: #FFFFFF;
    --ink: #26281F;
    --ink-soft: #6B6A5C;
    --green: #1F3A2E;
    --green-deep: #14261D;
    --gold: #C08A28;
    --gold-soft: #E9D9B0;
    --track: #E4DCC8;
    --danger: #B3452F;
    --radius: 18px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: background 0.3s ease;
  }

  body.modo-rejeicao { background: #33352E; }
  body.modo-rejeicao .topo { display: none; }

  .topo {
    width: 100%;
    max-width: 560px;
    padding: 22px 20px 6px;
  }

  .trilha-wrap {
    width: 100%;
    max-width: 560px;
    padding: 0 20px;
  }

  svg.trilha { width: 100%; height: 74px; display: block; }

  main {
    width: 100%;
    max-width: 560px;
    flex: 1;
    display: flex;
    align-items: center;
    padding: 10px 20px 40px;
  }

  .card {
    width: 100%;
    animation: subir 0.45s ease;
  }

  @keyframes subir {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    font-size: 13px;
    color: #F24332;
    font-weight: 600;
    letter-spacing: 0.04em;
    margin-bottom: 10px;
  }

  .intro-negrito {
    font-weight: 700;
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink);
    margin: 0 0 16px;
  }

  .intro-laranja {
    font-weight: 600;
    font-size: 15px;
    line-height: 1.6;
    color: #F24332;
    margin: 0 0 26px;
  }

  .voce-chegou {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 32px;
    line-height: 1.15;
    color: var(--green);
    margin: 0 0 10px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 26px;
    line-height: 1.28;
    margin: 0 0 12px;
    color: var(--green-deep);
  }

  body.modo-rejeicao h1 { color: #F2EFE6; }

  p.sub {
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink-soft);
    margin: 0 0 20px;
  }

  body.modo-rejeicao p.sub { color: #C9C6B9; }

  .imagem-etapa {
    width: 100%;
    max-height: 220px;
    object-fit: cover;
    border-radius: 14px;
    display: block;
    margin-bottom: 20px;
    box-shadow: 0 6px 20px rgba(38, 40, 31, 0.12);
  }

  .campo { margin-bottom: 16px; }

  .campo label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 6px;
  }

  .campo input {
    width: 100%;
    padding: 14px 16px;
    font-size: 16px;
    font-family: 'Inter', sans-serif;
    border: 1.5px solid var(--track);
    border-radius: 12px;
    background: var(--card);
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .campo input:focus { border-color: var(--gold); }

  .opcoes { display: flex; flex-direction: column; gap: 10px; }

  .opcao {
    width: 100%;
    text-align: center;
    padding: 15px 18px;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    border: 1.5px solid var(--track);
    border-radius: 12px;
    background: var(--card);
    color: var(--ink);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
  }

  .opcao:hover { border-color: var(--gold); background: #FFFDF8; }
  .opcao.selecionada { border-color: var(--green); background: var(--gold-soft); }

  .opcoes.grade {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .btn-avancar {
    display: block;
    width: 100%;
    margin-top: 22px;
    padding: 16px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    box-sizing: border-box;
    transition: background 0.15s, opacity 0.15s;
  }

  .btn-avancar:hover { background: var(--green-deep); }
  .btn-avancar:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-secundario {
    width: 100%;
    margin-top: 10px;
    padding: 13px;
    background: none;
    border: 1.5px dashed var(--track);
    border-radius: 12px;
    color: var(--ink-soft);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    text-align: center;
  }

  .btn-secundario:hover { border-color: var(--gold); color: var(--ink); }

  .btn-secundario-vermelho {
    width: 100%;
    margin-top: 14px;
    padding: 12px;
    background: none;
    border: none;
    color: var(--danger);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    text-align: center;
    text-decoration: underline;
  }

  .btn-voltar {
    display: block;
    margin: 14px auto 0;
    background: none;
    border: none;
    color: var(--ink-soft);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    text-decoration: underline;
    text-align: center;
    width: 100%;
  }

  .final-icone {
    width: 64px; height: 64px; margin-bottom: 18px;
  }

  .erro-campo {
    color: var(--danger);
    font-size: 12px;
    margin-top: 6px;
    display: none;
  }

  /* --- efeito de subida ao carregar (todos os botões) --- */
  @keyframes subirBotao {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .opcao, .btn-avancar, .btn-secundario, .btn-secundario-vermelho, .btn-voltar {
    animation: subirBotao 0.4s ease both;
  }

  .opcoes .opcao:nth-child(1) { animation-delay: 0.04s; }
  .opcoes .opcao:nth-child(2) { animation-delay: 0.09s; }
  .opcoes .opcao:nth-child(3) { animation-delay: 0.14s; }
  .opcoes .opcao:nth-child(4) { animation-delay: 0.19s; }
  .opcoes .opcao:nth-child(5) { animation-delay: 0.24s; }
  .opcoes .opcao:nth-child(6) { animation-delay: 0.29s; }
  .btn-avancar { animation-delay: 0.1s; }
  .btn-secundario { animation-delay: 0.15s; }
  .btn-secundario-vermelho { animation-delay: 0.2s; }

  /* --- efeito de pulse ao passar o mouse ou clicar --- */
  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.035); }
    100% { transform: scale(1); }
  }

  .opcao:hover, .btn-avancar:hover, .btn-secundario:hover, .btn-secundario-vermelho:hover {
    animation: pulse 0.35s ease;
  }

  .opcao:active, .btn-avancar:active, .btn-secundario:active {
    transform: scale(0.97);
  }
</style>
</head>

/* ===================== SALVAR PROGRESSO ===================== */
async function salvarProgresso(camposNovos, etapaAtual, finalizado) {
  try {
    await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({
        token: TOKEN,
        action: 'save_lead',
        id_lead: idLead,
        etapa_atual: etapaAtual,
        finalizado: !!finalizado,
        ...camposNovos
      })
    });
  } catch (err) {
    console.error('Falha ao salvar progresso', err);
  }
}

/* ===================== TRILHA / PROGRESSO VISUAL ===================== */
const pathPreenchida = document.getElementById('trilhaPreenchida');
const marcador = document.getElementById('marcador');
const pathFundo = document.getElementById('trilhaFundo');
const comprimentoTotal = pathFundo.getTotalLength();
pathPreenchida.style.strokeDasharray = comprimentoTotal;
pathPreenchida.style.strokeDashoffset = comprimentoTotal;

function atualizarTrilha() {
  const progresso = indice / (etapas.length - 1);
  const offset = comprimentoTotal * (1 - progresso);
  pathPreenchida.style.strokeDashoffset = offset;
  const ponto = pathFundo.getPointAtLength(comprimentoTotal * progresso);
  marcador.setAttribute('cx', ponto.x);
  marcador.setAttribute('cy', ponto.y);
}

/* ===================== MÁSCARA DE DATA ===================== */
function aplicarMascaraData(input) {
  input.addEventListener('input', () => {
    let v = input.value.replace(/\D/g, '').slice(0, 8);
    if (v.length >= 5) v = v.slice(0,2) + '/' + v.slice(2,4) + '/' + v.slice(4);
    else if (v.length >= 3) v = v.slice(0,2) + '/' + v.slice(2);
    input.value = v;
  });
}

/* ===================== MÁSCARA DE TELEFONE ===================== */
function aplicarMascaraTelefone(input) {
  input.addEventListener('input', () => {
    let v = input.value.replace(/\D/g, '').slice(0, 11);
    if (v.length === 0) { input.value = ''; return; }
    let formatado = '(' + v.slice(0, 2);
    if (v.length >= 2) formatado += ') ';
    if (v.length > 2) {
      if (v.length <= 6) {
        formatado += v.slice(2);
      } else if (v.length <= 10) {
        formatado += v.slice(2, 6) + '-' + v.slice(6);
      } else {
        formatado += v.slice(2, 7) + '-' + v.slice(7);
      }
    }
    input.value = formatado;
  });
}

    `;
  }

  if (etapa.tipo === 'campos') {
    let html = `<div class="eyebrow">${etapa.eyebrow}</div><h1>${etapa.titulo}</h1>`;
    html += imgHtml(etapa.imagem);
    if (etapa.sub) html += `<p class="sub">${etapa.sub}</p>`;
    etapa.campos.forEach(c => {
      html += `
        <div class="campo">
          <label>${c.label}</label>
          <input type="${c.tipo}" id="campo_${c.key}" placeholder="${c.placeholder}" value="${dados[c.key] || ''}">
          <div class="erro-campo" id="erro_${c.key}">Preenche esse campo pra gente continuar.</div>
        </div>
      `;
    });
    html += `<button class="btn-avancar" id="btnPrincipal">${etapa.botaoLabel || 'Continuar'}</button>`;
    if (etapa.botaoExtra) {
      html += `<button class="btn-secundario" id="btnExtra">${etapa.botaoExtra.label}</button>`;
    }
    if (indice > 1) html += `<button class="btn-voltar" id="btnVoltar">Voltar</button>`;
    card.innerHTML = html;

    etapa.campos.forEach(c => {
      if (c.mascara === 'data') aplicarMascaraData(document.getElementById('campo_' + c.key));
      if (c.mascara === 'telefone') aplicarMascaraTelefone(document.getElementById('campo_' + c.key));
    });

    document.getElementById('btnPrincipal').onclick = () => {
      let valido = true;
      const novos = {};
      etapa.campos.forEach(c => {
        const el = document.getElementById('campo_' + c.key);
        const val = el.value.trim();
        if (!val) {
          valido = false;
          document.getElementById('erro_' + c.key).style.display = 'block';
        } else {
          document.getElementById('erro_' + c.key).style.display = 'none';
          dados[c.key] = val;
          novos[c.key] = val;
        }
      });
      if (!valido) return;
      salvarProgresso(novos, etapa.id, false);
      avancar();
    };

    if (etapa.botaoExtra) {
      document.getElementById('btnExtra').onclick = () => {
        const chave = etapa.campos[0].key;
        dados[chave] = etapa.botaoExtra.valor;
        const novos = {};
        novos[chave] = etapa.botaoExtra.valor;
        salvarProgresso(novos, etapa.id, false);
        avancar();
      };
    }

    const btnVoltar = document.getElementById('btnVoltar');
    if (btnVoltar) btnVoltar.onclick = voltar;
  }

  if (etapa.tipo === 'escolha') {
    let html = `<div class="eyebrow">${etapa.eyebrow}</div><h1>${etapa.titulo}</h1>`;
    html += imgHtml(etapa.imagem);
    if (etapa.sub) html += `<p class="sub">${etapa.sub}</p>`;
    html += `<div class="opcoes${etapa.grade ? ' grade' : ''}">`;
    etapa.opcoes.forEach(op => {
      const selecionada = dados[etapa.campo] === op ? ' selecionada' : '';
      html += `<button class="opcao${selecionada}" data-valor="${op}">${op}</button>`;
    });
    html += `</div>`;
    if (indice > 1) html += `<button class="btn-voltar" id="btnVoltar">Voltar</button>`;
    card.innerHTML = html;

    card.querySelectorAll('.opcao').forEach(btn => {
      btn.onclick = () => {
        const valor = btn.getAttribute('data-valor');
        dados[etapa.campo] = valor;
        const novos = {};
        novos[etapa.campo] = valor;
        salvarProgresso(novos, etapa.id, false);
        setTimeout(avancar, 180);
      };
    });

    const btnVoltar = document.getElementById('btnVoltar');
    if (btnVoltar) btnVoltar.onclick = voltar;
  }
}

function mostrarRejeicao() {
  document.body.classList.add('modo-rejeicao');
  card.innerHTML = `
    <h1>Se você não quer conquistar o seu primeiro imóvel, ou já tem o seu primeiro imóvel, realmente esse mapa não é pra você.</h1>
    <p class="sub">Obrigado pela sinceridade, pode fechar essa página.</p>
    <p class="sub">Mas se você clicou errado ou pensou melhor, clique no botão abaixo e inicie a sua jornada rumo ao seu novo lar.</p>
    <button class="btn-avancar" id="btnVoltarJornada">Quero continuar a minha jornada.</button>
  `;
  document.getElementById('btnVoltarJornada').onclick = () => {
    renderizar();
  };
}

function avancar() {
  if (indice < etapas.length - 1) {
    indice++;
    if (indice === etapas.length - 1) {
      salvarProgresso({}, 'final', true);
    }
    renderizar();
  }
}

function voltar() {
  if (indice > 0) {
    indice--;
    renderizar();
  }
}

renderizar();
</script>
